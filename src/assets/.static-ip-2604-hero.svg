<svg xmlns="http://www.w3.org/2000/svg" width="1360" height="680" viewBox="0 0 1360 680">
  <defs>
    <radialGradient id="glow" cx="30%" cy="35%" r="80%">
      <stop offset="0%" stop-color="#0a1817"/>
      <stop offset="100%" stop-color="#06100f"/>
    </radialGradient>
    <pattern id="grid" width="34" height="34" patternUnits="userSpaceOnUse">
      <path d="M34 0H0V34" fill="none" stroke="#0d1c1a" stroke-width="1"/>
    </pattern>
  </defs>

  <rect width="1360" height="680" fill="url(#glow)"/>
  <rect width="1360" height="680" fill="url(#grid)" opacity="0.5"/>

  <!-- ghost network nodes, bottom-right -->
  <g opacity="0.5" stroke="#0f201e" stroke-width="5" fill="none">
    <line x1="1200" y1="470" x2="1130" y2="560"/>
    <line x1="1200" y1="470" x2="1290" y2="560"/>
    <line x1="1130" y1="560" x2="1290" y2="560"/>
    <circle cx="1200" cy="470" r="20" fill="#06100f"/>
    <circle cx="1130" cy="560" r="20" fill="#06100f"/>
    <circle cx="1290" cy="560" r="20" fill="#06100f"/>
  </g>

  <!-- badge top-right -->
  <g>
    <rect x="1040" y="48" width="272" height="46" rx="8" fill="none" stroke="#2c6f6a" stroke-width="1.5"/>
    <text x="1066" y="77" font-family="'SF Mono','Menlo','DejaVu Sans Mono','Consolas',monospace" font-size="20" letter-spacing="2" fill="#2dd4bf">&#9670; NETPLAN &#183; 26.04</text>
  </g>

  <!-- editor window -->
  <g>
    <rect x="72" y="120" width="672" height="462" rx="11" fill="#0a1716" stroke="#2c6f6a" stroke-width="1.5"/>
    <line x1="72" y1="178" x2="744" y2="178" stroke="#0f201e" stroke-width="1.5"/>
    <circle cx="104" cy="149" r="7" fill="#2c6f6a"/>
    <circle cx="128" cy="149" r="7" fill="#2c6f6a"/>
    <circle cx="152" cy="149" r="7" fill="#2c6f6a"/>
    <text x="200" y="156" font-family="'SF Mono','Menlo','DejaVu Sans Mono','Consolas',monospace" font-size="20" fill="#2c6f6a">/etc/netplan/50-cloud-init.yaml</text>

    <text x="104" y="216" font-family="'SF Mono','Menlo','DejaVu Sans Mono','Consolas',monospace" font-size="16.5" fill="#7af0e0"><tspan fill="#54a8f0">network</tspan>:</text>
    <text x="104" y="242" font-family="'SF Mono','Menlo','DejaVu Sans Mono','Consolas',monospace" font-size="16.5" fill="#7af0e0">  <tspan fill="#54a8f0">renderer</tspan>: networkd</text>
    <text x="104" y="268" font-family="'SF Mono','Menlo','DejaVu Sans Mono','Consolas',monospace" font-size="16.5" fill="#7af0e0">  <tspan fill="#54a8f0">ethernets</tspan>:</text>
    <text x="104" y="294" font-family="'SF Mono','Menlo','DejaVu Sans Mono','Consolas',monospace" font-size="16.5" fill="#7af0e0">    <tspan fill="#2dd4bf">enp3s0</tspan>:</text>
    <text x="104" y="320" font-family="'SF Mono','Menlo','DejaVu Sans Mono','Consolas',monospace" font-size="16.5" fill="#7af0e0">      <tspan fill="#54a8f0">dhcp4</tspan>: no</text>
    <text x="104" y="346" font-family="'SF Mono','Menlo','DejaVu Sans Mono','Consolas',monospace" font-size="16.5" fill="#7af0e0">      <tspan fill="#54a8f0">addresses</tspan>: [<tspan fill="#6fd08a">192.168.1.10/24</tspan>]</text>
    <text x="104" y="372" font-family="'SF Mono','Menlo','DejaVu Sans Mono','Consolas',monospace" font-size="16.5" fill="#7af0e0">      <tspan fill="#54a8f0">routes</tspan>:</text>
    <text x="104" y="398" font-family="'SF Mono','Menlo','DejaVu Sans Mono','Consolas',monospace" font-size="16.5" fill="#7af0e0">        - <tspan fill="#54a8f0">to</tspan>: default</text>
    <text x="104" y="424" font-family="'SF Mono','Menlo','DejaVu Sans Mono','Consolas',monospace" font-size="16.5" fill="#7af0e0">          <tspan fill="#54a8f0">via</tspan>: <tspan fill="#6fd08a">192.168.1.1</tspan></text>

    <text x="104" y="486" font-family="'SF Mono','Menlo','DejaVu Sans Mono','Consolas',monospace" font-size="16.5" fill="#2dd4bf"><tspan fill="#7af0e0">$</tspan> sudo netplan try</text>
    <text x="104" y="512" font-family="'SF Mono','Menlo','DejaVu Sans Mono','Consolas',monospace" font-size="16.5" fill="#6fd08a"><tspan fill="#6fd08a">&#10003;</tspan> rolls back in 120s unless confirmed</text>

    <text x="104" y="552" font-family="'SF Mono','Menlo','DejaVu Sans Mono','Consolas',monospace" font-size="17" fill="#2c6f6a">spaces, never tabs &#183; whitespace is load-bearing</text>
  </g>

  <!-- right column: the 26.04 convergence -->
  <g font-family="'SF Mono','Menlo','DejaVu Sans Mono','Consolas',monospace">
    <text x="852" y="200" font-size="20" letter-spacing="2" fill="#2c6f6a">ONE FILE, EITHER BOX</text>

    <rect x="852" y="220" width="456" height="178" rx="8" fill="none" stroke="#2dd4bf" stroke-width="2"/>
    <text x="880" y="266" font-size="19" fill="#7af0e0">server  &#8594; you edit the YAML</text>
    <text x="880" y="302" font-size="19" fill="#7af0e0">desktop &#8594; GUI writes it for you</text>
    <text x="880" y="344" font-size="18" fill="#2dd4bf">  both land in /etc/netplan/</text>
    <text x="880" y="378" font-size="16.5" fill="#2c6f6a">90-NM-&lt;uuid&gt;.yaml on desktop</text>

    <text x="852" y="452" font-size="18" fill="#7af0e0"><tspan fill="#e5534b">gateway4</tspan>  deprecated &#183; use routes:</text>
    <text x="852" y="484" font-size="18" fill="#7af0e0"><tspan fill="#54a8f0">try</tspan> before apply on remote boxes</text>
    <text x="852" y="516" font-size="18" fill="#7af0e0"><tspan fill="#54a8f0">ip a</tspan> / <tspan fill="#54a8f0">ip route</tspan> tell you the names</text>
    <text x="852" y="552" font-size="17" fill="#2c6f6a">netplan is the single source of truth</text>
  </g>
</svg>