<svg xmlns="http://www.w3.org/2000/svg" width="1020" height="510" viewBox="0 0 1020 510" font-family="ui-monospace, 'JetBrains Mono', 'Fira Code', Menlo, monospace">
  <defs>
    <pattern id="scan" width="3" height="3" patternUnits="userSpaceOnUse">
      <rect width="3" height="1" fill="#39ff14" opacity="0.035"/>
    </pattern>
    <filter id="glow" x="-60%" y="-60%" width="220%" height="220%">
      <feGaussianBlur stdDeviation="3.2" result="b"/>
      <feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <rect width="1020" height="510" fill="#0d0d0d"/>
  <rect width="1020" height="510" fill="url(#scan)"/>

  <!-- faint watermark prompt -->
  <text x="978" y="486" text-anchor="end" font-size="120" fill="#39ff14" opacity="0.05" font-weight="700">&gt;_</text>

  <!-- badges -->
  <rect x="822" y="36" width="160" height="34" rx="6" fill="#0d0d0d" stroke="#1b730e"/>
  <text x="902" y="59" text-anchor="middle" font-size="15" fill="#39ff14" letter-spacing="2">◆ AI SKILL</text>
  <rect x="624" y="36" width="166" height="34" rx="17" fill="#0d0d0d" stroke="#1b730e"/>
  <text x="707" y="59" text-anchor="middle" font-size="14" fill="#39ff14" letter-spacing="1">[ READ-ONLY ]</text>

  <!-- terminal card -->
  <rect x="56" y="96" width="474" height="330" rx="10" fill="#070707" stroke="#1b730e"/>
  <rect x="56" y="96" width="474" height="38" rx="10" fill="#0d0d0d"/>
  <rect x="56" y="120" width="474" height="14" fill="#0d0d0d"/>
  <circle cx="82" cy="115" r="5" fill="#1b730e"/>
  <circle cx="100" cy="115" r="5" fill="#1b730e"/>
  <circle cx="118" cy="115" r="5" fill="#1b730e"/>
  <text x="150" y="120" font-size="14" fill="#1b730e">~/.claude/skills/code-review-recon</text>

  <!-- terminal body -->
  <text x="84" y="178" font-size="17"><tspan fill="#39ff14">$ </tspan><tspan fill="#c9d6c4">recon .</tspan></text>
  <text x="84" y="216" font-size="16"><tspan fill="#39ff14">&gt; </tspan><tspan fill="#c9d6c4">tree · README · manifests</tspan></text>
  <text x="84" y="244" font-size="16"><tspan fill="#39ff14">&gt; </tspan><tspan fill="#c9d6c4">trace 1 request end-to-end</tspan></text>
  <text x="84" y="272" font-size="16"><tspan fill="#39ff14">&gt; </tspan><tspan fill="#c9d6c4">git log --stat · hotspots</tspan></text>
  <text x="84" y="300" font-size="16"><tspan fill="#39ff14">&gt; </tspan><tspan fill="#c9d6c4">write ARCHITECTURE_REVIEW.md </tspan><tspan fill="#39ff14">▋</tspan></text>
  <text x="84" y="358" font-size="13" fill="#1b730e">no edits · nothing changed</text>

  <!-- architecture stack -->
  <g filter="url(#glow)">
    <rect x="625" y="104" width="300" height="56" rx="9" fill="#0d0d0d" stroke="#39ff14"/>
  </g>
  <text x="652" y="138" font-size="16" fill="#39ff14" letter-spacing="1">ROUTES</text>
  <text x="898" y="138" text-anchor="end" font-size="12" fill="#1b730e">entry points</text>

  <rect x="625" y="190" width="300" height="56" rx="9" fill="#0d0d0d" stroke="#1b730e"/>
  <text x="652" y="224" font-size="16" fill="#39ff14" letter-spacing="1">SERVICES</text>
  <text x="898" y="224" text-anchor="end" font-size="12" fill="#1b730e">business logic</text>

  <rect x="625" y="276" width="300" height="56" rx="9" fill="#0d0d0d" stroke="#1b730e"/>
  <text x="652" y="310" font-size="16" fill="#39ff14" letter-spacing="1">DATA</text>
  <text x="898" y="310" text-anchor="end" font-size="12" fill="#1b730e">stores · external</text>

  <rect x="625" y="362" width="300" height="48" rx="9" fill="#0d0d0d" stroke="#1b730e" stroke-dasharray="4 3"/>
  <text x="775" y="391" text-anchor="middle" font-size="14" fill="#c9d6c4">ARCHITECTURE_REVIEW.md</text>

  <!-- connectors -->
  <g stroke="#1b730e" stroke-width="1.6" fill="none">
    <path d="M775,160 L775,190"/>
    <path d="M775,246 L775,276"/>
    <path d="M775,332 L775,362"/>
  </g>
  <g fill="#39ff14">
    <path d="M769,190 L781,190 L775,200 Z"/>
    <path d="M769,276 L781,276 L775,286 Z"/>
    <path d="M769,362 L781,362 L775,372 Z"/>
  </g>
</svg>
