<svg xmlns="http://www.w3.org/2000/svg" width="1360" height="680" viewBox="0 0 1360 680">
  <defs>
    <radialGradient id="glow" cx="30%" cy="35%" r="80%">
      <stop offset="0%" stop-color="#0a1917"/>
      <stop offset="100%" stop-color="#06100f"/>
    </radialGradient>
    <pattern id="grid" width="34" height="34" patternUnits="userSpaceOnUse">
      <path d="M34 0H0V34" fill="none" stroke="#0e2522" stroke-width="1"/>
    </pattern>
  </defs>

  <rect width="1360" height="680" fill="url(#glow)"/>
  <rect width="1360" height="680" fill="url(#grid)" opacity="0.5"/>

  <!-- big ghost book glyph, bottom-right -->
  <g opacity="0.5" stroke="#13332f" stroke-width="9" fill="none">
    <path d="M1150 440 L1150 630 M1150 440 Q1215 412 1280 440 L1280 630 Q1215 602 1150 630 M1280 440 Q1310 425 1330 440 L1330 630 Q1310 615 1280 630"/>
  </g>

  <!-- badge top-right -->
  <g>
    <rect x="1086" y="48" width="226" height="46" rx="8" fill="none" stroke="#2c7a72" stroke-width="1.5"/>
    <text x="1112" y="77" font-family="'SF Mono','Menlo','DejaVu Sans Mono','Consolas',monospace" font-size="20" letter-spacing="2" fill="#5eead4">&#9670; ORLY &#183; EPUB</text>
  </g>

  <!-- terminal window -->
  <g>
    <rect x="72" y="120" width="672" height="462" rx="11" fill="#0a1816" stroke="#2c7a72" stroke-width="1.5"/>
    <line x1="72" y1="178" x2="744" y2="178" stroke="#13332f" stroke-width="1.5"/>
    <circle cx="104" cy="149" r="7" fill="#2c7a72"/>
    <circle cx="128" cy="149" r="7" fill="#2c7a72"/>
    <circle cx="152" cy="149" r="7" fill="#2c7a72"/>
    <text x="200" y="156" font-family="'SF Mono','Menlo','DejaVu Sans Mono','Consolas',monospace" font-size="20" fill="#2c7a72">orly &#183; docker cli</text>

    <text x="104" y="226" font-family="'SF Mono','Menlo','DejaVu Sans Mono','Consolas',monospace" font-size="20" fill="#5eead4"><tspan fill="#99f6e4">$</tspan> docker build -t orly .</text>
    <text x="104" y="262" font-family="'SF Mono','Menlo','DejaVu Sans Mono','Consolas',monospace" font-size="19" fill="#6fd08a">&#10003; image built</text>

    <text x="104" y="320" font-family="'SF Mono','Menlo','DejaVu Sans Mono','Consolas',monospace" font-size="20" fill="#5eead4"><tspan fill="#99f6e4">$</tspan> orly sso &lt;book id&gt;</text>
    <text x="104" y="356" font-family="'SF Mono','Menlo','DejaVu Sans Mono','Consolas',monospace" font-size="19" fill="#6fd08a">&#10003; Authentication successful</text>
    <text x="104" y="392" font-family="'SF Mono','Menlo','DejaVu Sans Mono','Consolas',monospace" font-size="17" fill="#2c7a72">  streaming manifest &#8230;</text>
    <text x="104" y="428" font-family="'SF Mono','Menlo','DejaVu Sans Mono','Consolas',monospace" font-size="19" fill="#6fd08a">&#10003; created book.epub  <tspan fill="#2c7a72">EPUB 3</tspan></text>

    <text x="104" y="522" font-family="'SF Mono','Menlo','DejaVu Sans Mono','Consolas',monospace" font-size="19" fill="#2c7a72">build &#183; authenticate &#183; verify</text>
  </g>

  <!-- right column: the flow -->
  <g font-family="'SF Mono','Menlo','DejaVu Sans Mono','Consolas',monospace">
    <text x="852" y="200" font-size="20" letter-spacing="2" fill="#2c7a72">THE FLOW</text>

    <rect x="852" y="220" width="456" height="64" rx="8" fill="none" stroke="#5eead4" stroke-width="2"/>
    <text x="876" y="259" font-size="20" fill="#99f6e4">browser cookies  &#8594;  orm-jwt</text>

    <text x="1076" y="312" font-size="22" fill="#2c7a72" text-anchor="middle">&#8595;</text>

    <rect x="852" y="328" width="456" height="64" rx="8" fill="none" stroke="#2c7a72" stroke-width="2"/>
    <text x="876" y="367" font-size="20" fill="#5eead4">v2 manifest  /epubs/.../files/</text>

    <text x="1076" y="420" font-size="22" fill="#2c7a72" text-anchor="middle">&#8595;</text>

    <rect x="852" y="436" width="456" height="64" rx="8" fill="none" stroke="#6fd08a" stroke-width="2"/>
    <text x="876" y="475" font-size="20" fill="#6fd08a">streamed into a .epub (a ZIP)</text>

    <text x="852" y="548" font-size="19" fill="#2c7a72">&#8594; your subscription, your content,</text>
    <text x="852" y="572" font-size="19" fill="#2c7a72">  for learning. mind the terms of service.</text>
  </g>
</svg>