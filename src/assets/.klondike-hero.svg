  </g>

  <!-- drag/tween arrow -->
  <path d="M300 470 C520 470 560 300 700 210" fill="none" stroke="#e8b04a" stroke-width="2" stroke-dasharray="8 8" opacity="0.7"/>
  <path d="M700 210 l2 11 l-11 -3 z" fill="#e8b04a"/>

  <!-- right: what the game taught -->
  <g font-family="'SF Mono','Menlo','DejaVu Sans Mono','Consolas',monospace">
    <text x="820" y="180" font-size="20" letter-spacing="2" fill="#6f8a7c">WHAT A CARD GAME TAUGHT ME</text>

    <text x="820" y="232" font-size="21" fill="#f3ead6"><tspan fill="#e8b04a">&#183;</tspan> modules that hide their state</text>
    <text x="820" y="272" font-size="21" fill="#f3ead6"><tspan fill="#e8b04a">&#183;</tspan> objects without classes, via metatables</text>
    <text x="820" y="312" font-size="21" fill="#f3ead6"><tspan fill="#e8b04a">&#183;</tspan> undo by snapshot</text>
    <text x="820" y="352" font-size="21" fill="#f3ead6"><tspan fill="#e8b04a">&#183;</tspan> dt-based tweening</text>

    <rect x="820" y="392" width="468" height="132" rx="10" fill="#0a1f16" stroke="#1c4a34" stroke-width="1.5"/>
    <text x="844" y="430" font-size="17" fill="#6f8a7c">-- an object, the Lua way</text>
    <text x="844" y="462" font-size="17" fill="#f3ead6">Card = {}</text>
    <text x="844" y="490" font-size="17" fill="#f3ead6">Card.__index = Card</text>
    <text x="844" y="512" font-size="16" fill="#e8b04a">setmetatable(c, Card)  -- no class needed</text>

    <text x="820" y="566" font-size="18" fill="#6f8a7c">the Lua I skipped writing Pong.</text>
  </g>
</svg>