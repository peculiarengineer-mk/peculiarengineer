  <rect x="685" y="351" width="18" height="18" fill="#c06bd8" opacity="0.21000000000000002"/><rect x="659" y="351" width="18" height="18" fill="#c06bd8" opacity="0.14"/><rect x="633" y="351" width="18" height="18" fill="#c06bd8" opacity="0.07"/><rect x="711" y="351" width="18" height="18" fill="#f4f4f4"/>

