  <text x="530" y="248" font-family="'SF Mono','Menlo','DejaVu Sans Mono','Consolas',monospace" font-size="132" font-weight="700" fill="#f4f4f4" text-anchor="middle" letter-spacing="4">6</text>
  <text x="830" y="248" font-family="'SF Mono','Menlo','DejaVu Sans Mono','Consolas',monospace" font-size="132" font-weight="700" fill="#f4f4f4" text-anchor="middle" letter-spacing="4">6</text>

