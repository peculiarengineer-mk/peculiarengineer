<svg xmlns="http://www.w3.org/2000/svg" width="1020" height="510" viewBox="0 0 1020 510" font-family="ui-monospace, 'JetBrains Mono', 'Fira Code', Menlo, monospace">
  <defs>
    <pattern id="scan" width="3" height="3" patternUnits="userSpaceOnUse">
      <rect width="3" height="1" fill="#39ff14" opacity="0.035"/>
    </pattern>
    <filter id="glow" x="-60%" y="-60%" width="220%" height="220%">
      <feGaussianBlur stdDeviation="3.2" result="b"/>
      <feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <rect width="1020" height="510" fill="#0d0d0d"/>
  <rect width="1020" height="510" fill="url(#scan)"/>

  <!-- faint watermark prompt -->
  <text x="978" y="486" text-anchor="end" font-size="120" fill="#39ff14" opacity="0.05" font-weight="700">&gt;_</text>

  <!-- AI SKILL badge -->
  <rect x="822" y="36" width="160" height="34" rx="6" fill="#0d0d0d" stroke="#1b730e"/>
  <text x="902" y="59" text-anchor="middle" font-size="15" fill="#39ff14" letter-spacing="2">◆ AI SKILL</text>

  <!-- terminal card -->
  <rect x="56" y="96" width="474" height="330" rx="10" fill="#070707" stroke="#1b730e"/>
  <rect x="56" y="96" width="474" height="38" rx="10" fill="#0d0d0d"/>
  <rect x="56" y="120" width="474" height="14" fill="#0d0d0d"/>
  <circle cx="82" cy="115" r="5" fill="#1b730e"/>
  <circle cx="100" cy="115" r="5" fill="#1b730e"/>
  <circle cx="118" cy="115" r="5" fill="#1b730e"/>
  <text x="150" y="120" font-size="14" fill="#1b730e">~/.claude/skills/dev-handoff</text>

  <!-- terminal body -->
  <text font-size="17">
    <tspan x="84" y="178" fill="#39ff14">$ </tspan><tspan fill="#c9d6c4">opencode run --agent worker \</tspan>
  </text>
  <text x="108" y="206" font-size="17" fill="#c9d6c4">-m zen/kimi-k2.6  "Task 3"</text>
  <text x="84" y="252" font-size="17"><tspan fill="#39ff14">&gt; </tspan><tspan fill="#c9d6c4">reading DEV_PLAN.md</tspan></text>
  <text x="84" y="282" font-size="17"><tspan fill="#39ff14">&gt; </tspan><tspan fill="#c9d6c4">3 tasks · 2 parallel-safe</tspan></text>
  <text x="84" y="312" font-size="17"><tspan fill="#39ff14">&gt; </tspan><tspan fill="#c9d6c4">dispatching to workers </tspan><tspan fill="#39ff14">▋</tspan></text>
  <text x="84" y="358" font-size="13" fill="#1b730e">one task · one file · one worker</text>

  <!-- orchestrator -->
  <g filter="url(#glow)">
    <rect x="690" y="104" width="170" height="60" rx="9" fill="#0d0d0d" stroke="#39ff14"/>
  </g>
  <text x="775" y="132" text-anchor="middle" font-size="17" fill="#39ff14" letter-spacing="1">PLAN</text>
  <text x="775" y="151" text-anchor="middle" font-size="11" fill="#1b730e">orchestrator</text>

  <!-- connectors -->
  <g stroke="#1b730e" stroke-width="1.6" fill="none">
    <path d="M775,164 C775,250 620,250 620,340"/>
    <path d="M775,164 L775,340"/>
    <path d="M775,164 C775,250 930,250 930,340"/>
  </g>
  <g fill="#39ff14">
    <path d="M614,340 L626,340 L620,350 Z"/>
    <path d="M769,340 L781,340 L775,350 Z"/>
    <path d="M924,340 L936,340 L930,350 Z"/>
  </g>

  <!-- workers -->
  <g>
    <rect x="560" y="350" width="120" height="60" rx="9" fill="#0d0d0d" stroke="#1b730e"/>
    <text x="620" y="378" text-anchor="middle" font-size="15" fill="#39ff14">worker</text>
    <text x="620" y="396" text-anchor="middle" font-size="11" fill="#c9d6c4">kimi-k2.6</text>

    <rect x="715" y="350" width="120" height="60" rx="9" fill="#0d0d0d" stroke="#1b730e"/>
    <text x="775" y="378" text-anchor="middle" font-size="15" fill="#39ff14">worker</text>
    <text x="775" y="396" text-anchor="middle" font-size="11" fill="#c9d6c4">mimo-v2.5</text>

    <rect x="870" y="350" width="120" height="60" rx="9" fill="#0d0d0d" stroke="#1b730e"/>
    <text x="930" y="378" text-anchor="middle" font-size="15" fill="#39ff14">worker</text>
    <text x="930" y="396" text-anchor="middle" font-size="11" fill="#c9d6c4">kimi-k2.6</text>
  </g>
  <text x="775" y="436" text-anchor="middle" font-size="13" fill="#1b730e">∥ run in parallel</text>
</svg>
