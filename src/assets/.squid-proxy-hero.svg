<svg xmlns="http://www.w3.org/2000/svg" width="1360" height="680" viewBox="0 0 1360 680">
  <defs>
    <radialGradient id="glow" cx="50%" cy="30%" r="80%">
      <stop offset="0%" stop-color="#0a1f29"/>
      <stop offset="100%" stop-color="#05131a"/>
    </radialGradient>
    <pattern id="grid" width="34" height="34" patternUnits="userSpaceOnUse">
      <path d="M34 0H0V34" fill="none" stroke="#0c2730" stroke-width="1"/>
    </pattern>
  </defs>

  <rect width="1360" height="680" fill="url(#glow)"/>
  <rect width="1360" height="680" fill="url(#grid)" opacity="0.5"/>

  <!-- badge top-right -->
  <g>
    <rect x="1006" y="48" width="306" height="46" rx="8" fill="none" stroke="#0e7490" stroke-width="1.5"/>
    <text x="1032" y="77" font-family="'SF Mono','Menlo','DejaVu Sans Mono','Consolas',monospace" font-size="20" letter-spacing="2" fill="#38bdf8">&#9670; SQUID &#183; BOTH WAYS</text>
  </g>

  <text x="72" y="86" font-family="'SF Mono','Menlo','DejaVu Sans Mono','Consolas',monospace" font-size="24" letter-spacing="2" fill="#a5f3fc">ONE DAEMON &#183; TWO DIRECTIONS</text>

  <!-- central squid node -->
  <g>
    <rect x="600" y="300" width="160" height="80" rx="12" fill="#082530" stroke="#38bdf8" stroke-width="2.5"/>
    <text x="680" y="335" font-family="'SF Mono','Menlo','DejaVu Sans Mono','Consolas',monospace" font-size="22" fill="#a5f3fc" text-anchor="middle">squid</text>
    <text x="680" y="362" font-family="'SF Mono','Menlo','DejaVu Sans Mono','Consolas',monospace" font-size="15" fill="#0e7490" text-anchor="middle">:3128 / :80</text>
  </g>

  <!-- FORWARD row (top): clients -> squid -> web -->
  <g font-family="'SF Mono','Menlo','DejaVu Sans Mono','Consolas',monospace">
    <text x="72" y="150" font-size="19" letter-spacing="2" fill="#0e7490">FORWARD &#183; in front of clients</text>
    <rect x="72" y="172" width="200" height="74" rx="8" fill="none" stroke="#155e75" stroke-width="2"/>
    <text x="172" y="206" font-size="18" fill="#a5f3fc" text-anchor="middle">clients</text>
    <text x="172" y="230" font-size="14" fill="#0e7490" text-anchor="middle">laptop &#183; phone</text>

    <rect x="1088" y="172" width="200" height="74" rx="8" fill="none" stroke="#155e75" stroke-width="2"/>
    <text x="1188" y="206" font-size="18" fill="#a5f3fc" text-anchor="middle">the web</text>
    <text x="1188" y="230" font-size="14" fill="#0e7490" text-anchor="middle">out of network</text>

    <path d="M280 250 Q470 250 628 312" fill="none" stroke="#38bdf8" stroke-width="2.5"/>
    <path d="M620 309 l14 1 l-9 11 z" fill="#38bdf8"/>
    <path d="M734 309 Q900 250 1080 232" fill="none" stroke="#38bdf8" stroke-width="2.5"/>
    <path d="M1082 240 l6 -12 l8 11 z" fill="#38bdf8"/>
  </g>

  <!-- REVERSE row (bottom): visitors -> squid -> origin -->
  <g font-family="'SF Mono','Menlo','DejaVu Sans Mono','Consolas',monospace">
    <text x="72" y="470" font-size="19" letter-spacing="2" fill="#0e7490">REVERSE &#183; in front of servers (accel)</text>
    <rect x="72" y="488" width="200" height="74" rx="8" fill="none" stroke="#155e75" stroke-width="2"/>
    <text x="172" y="522" font-size="18" fill="#a5f3fc" text-anchor="middle">visitors</text>
    <text x="172" y="546" font-size="14" fill="#0e7490" text-anchor="middle">think it's the site</text>

    <rect x="1088" y="488" width="200" height="74" rx="8" fill="none" stroke="#155e75" stroke-width="2"/>
    <text x="1188" y="522" font-size="18" fill="#a5f3fc" text-anchor="middle">origin</text>
    <text x="1188" y="546" font-size="14" fill="#0e7490" text-anchor="middle">cache_peer</text>

    <path d="M280 522 Q470 522 628 410" fill="none" stroke="#6fd08a" stroke-width="2.5"/>
    <path d="M620 414 l14 -1 l-7 13 z" fill="#6fd08a"/>
    <path d="M734 372 Q900 470 1080 502" fill="none" stroke="#6fd08a" stroke-width="2.5"/>
    <path d="M1082 494 l8 -11 l6 13 z" fill="#6fd08a"/>
  </g>

  <!-- the switch line -->
  <g font-family="'SF Mono','Menlo','DejaVu Sans Mono','Consolas',monospace">
    <rect x="430" y="612" width="500" height="42" rx="8" fill="none" stroke="#11303a" stroke-width="2" stroke-dasharray="7 5"/>
    <text x="680" y="640" font-size="18" fill="#a5f3fc" text-anchor="middle">http_port 80 <tspan fill="#38bdf8">accel</tspan>  &#8592; the switch</text>
  </g>
</svg>