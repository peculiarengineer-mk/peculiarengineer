<svg xmlns="http://www.w3.org/2000/svg" width="1360" height="680" viewBox="0 0 1360 680">
  <defs>
    <radialGradient id="glow" cx="30%" cy="35%" r="80%">
      <stop offset="0%" stop-color="#0d130f"/>
      <stop offset="100%" stop-color="#080b09"/>
    </radialGradient>
    <pattern id="grid" width="34" height="34" patternUnits="userSpaceOnUse">
      <path d="M34 0H0V34" fill="none" stroke="#10271a" stroke-width="1"/>
    </pattern>
  </defs>

  <rect width="1360" height="680" fill="url(#glow)"/>
  <rect width="1360" height="680" fill="url(#grid)" opacity="0.5"/>

  <!-- big ghost chevron, bottom-right -->
  <path d="M1180 470 L1300 560 L1180 650" fill="none" stroke="#1d4d33" stroke-width="10" opacity="0.55"/>

  <!-- badge top-right -->
  <g>
    <rect x="1118" y="48" width="194" height="46" rx="8" fill="none" stroke="#2c7d4c" stroke-width="1.5"/>
    <text x="1150" y="77" font-family="'SF Mono','Menlo','DejaVu Sans Mono','Consolas',monospace" font-size="22" letter-spacing="3" fill="#4ade80">&#9670; OLLAMA</text>
  </g>

  <!-- terminal window -->
  <g>
    <rect x="72" y="120" width="672" height="462" rx="11" fill="#0a100c" stroke="#2c7d4c" stroke-width="1.5"/>
    <line x1="72" y1="178" x2="744" y2="178" stroke="#1d4d33" stroke-width="1.5"/>
    <circle cx="104" cy="149" r="7" fill="#2c7d4c"/>
    <circle cx="128" cy="149" r="7" fill="#2c7d4c"/>
    <circle cx="152" cy="149" r="7" fill="#2c7d4c"/>
    <text x="200" y="156" font-family="'SF Mono','Menlo','DejaVu Sans Mono','Consolas',monospace" font-size="20" fill="#2c7d4c">ollama on ubuntu</text>

    <text x="104" y="232" font-family="'SF Mono','Menlo','DejaVu Sans Mono','Consolas',monospace" font-size="22" fill="#4ade80"><tspan fill="#6ff09a">$</tspan> curl -fsSL ollama.com/install.sh | sh</text>

    <text x="104" y="288" font-family="'SF Mono','Menlo','DejaVu Sans Mono','Consolas',monospace" font-size="23" fill="#4ade80"><tspan fill="#6ff09a">&#10003;</tspan> ollama          <tspan fill="#2c7d4c">active (running)</tspan></text>
    <text x="104" y="324" font-family="'SF Mono','Menlo','DejaVu Sans Mono','Consolas',monospace" font-size="23" fill="#4ade80"><tspan fill="#6ff09a">&#10003;</tspan> llama3.2:3b     <tspan fill="#2c7d4c">pulled</tspan></text>

    <text x="104" y="384" font-family="'SF Mono','Menlo','DejaVu Sans Mono','Consolas',monospace" font-size="22" fill="#4ade80"><tspan fill="#6ff09a">$</tspan> ollama run llama3.2:3b</text>
    <text x="104" y="420" font-family="'SF Mono','Menlo','DejaVu Sans Mono','Consolas',monospace" font-size="23" fill="#4ade80"><tspan fill="#2c7d4c">&gt;</tspan> the sky is blue because&#8230;<tspan fill="#6ff09a">&#9608;</tspan></text>
    <text x="104" y="456" font-family="'SF Mono','Menlo','DejaVu Sans Mono','Consolas',monospace" font-size="23" fill="#4ade80"><tspan fill="#2c7d4c">&gt;</tspan> api on <tspan fill="#6ff09a">127.0.0.1:11434</tspan></text>

    <text x="104" y="522" font-family="'SF Mono','Menlo','DejaVu Sans Mono','Consolas',monospace" font-size="19" fill="#2c7d4c">install &#183; pull &#183; run &#183; tunnel</text>
  </g>

  <!-- right column: two ways to run it -->
  <g font-family="'SF Mono','Menlo','DejaVu Sans Mono','Consolas',monospace">
    <text x="852" y="200" font-size="20" letter-spacing="2" fill="#2c7d4c">TWO WAYS TO RUN IT</text>

    <!-- oracle free box -->
    <rect x="852" y="220" width="456" height="86" rx="8" fill="none" stroke="#4ade80" stroke-width="2"/>
    <text x="876" y="258" font-size="26" fill="#6ff09a">ORACLE &#183; FREE</text>
    <text x="876" y="288" font-size="18" fill="#2c7d4c">ARM CPU &#183; 2 OCPU/12GB &#183; $0/mo</text>

    <!-- connector -->
    <text x="1080" y="338" font-size="20" fill="#2c7d4c" text-anchor="middle">or</text>

    <!-- vast gpu box -->
    <rect x="852" y="352" width="456" height="86" rx="8" fill="none" stroke="#2c7d4c" stroke-width="2"/>
    <text x="876" y="390" font-size="26" fill="#4ade80">VAST.AI &#183; GPU</text>
    <text x="876" y="420" font-size="18" fill="#2c7d4c">RTX 3090/4090 &#183; ~$0.13-0.40/hr</text>

    <!-- same commands bar -->
    <rect x="852" y="468" width="456" height="64" rx="8" fill="none" stroke="#1d4d33" stroke-width="2" stroke-dasharray="7 5"/>
    <text x="876" y="507" font-size="20" fill="#4ade80"><tspan fill="#6ff09a">&#9635;</tspan> same ollama commands  <tspan fill="#2c7d4c">on both</tspan></text>

    <text x="852" y="566" font-size="19" fill="#2c7d4c">&#8594; private LLM, free to a few cents/hr.</text>
  </g>
</svg>