<svg xmlns="http://www.w3.org/2000/svg" width="1360" height="680" viewBox="0 0 1360 680">
  <defs>
    <radialGradient id="glow" cx="30%" cy="35%" r="80%">
      <stop offset="0%" stop-color="#120c1d"/>
      <stop offset="100%" stop-color="#0a0810"/>
    </radialGradient>
    <pattern id="grid" width="34" height="34" patternUnits="userSpaceOnUse">
      <path d="M34 0H0V34" fill="none" stroke="#191228" stroke-width="1"/>
    </pattern>
  </defs>

  <rect width="1360" height="680" fill="url(#glow)"/>
  <rect width="1360" height="680" fill="url(#grid)" opacity="0.5"/>

  <!-- big ghost book glyph, bottom-right -->
  <g opacity="0.5" stroke="#2c2142" stroke-width="9" fill="none">
    <path d="M1150 440 L1150 630 M1150 440 Q1210 415 1270 440 L1270 630 Q1210 605 1150 630 M1270 440 Q1310 420 1330 440 L1330 630 Q1310 610 1270 630"/>
  </g>

  <!-- badge top-right -->
  <g>
    <rect x="1080" y="48" width="232" height="46" rx="8" fill="none" stroke="#6b4f96" stroke-width="1.5"/>
    <text x="1108" y="77" font-family="'SF Mono','Menlo','DejaVu Sans Mono','Consolas',monospace" font-size="20" letter-spacing="2" fill="#b794f6">&#9670; EPUB DOWNLOADER</text>
  </g>

  <!-- terminal window -->
  <g>
    <rect x="72" y="120" width="672" height="462" rx="11" fill="#0f0a18" stroke="#6b4f96" stroke-width="1.5"/>
    <line x1="72" y1="178" x2="744" y2="178" stroke="#2c2142" stroke-width="1.5"/>
    <circle cx="104" cy="149" r="7" fill="#6b4f96"/>
    <circle cx="128" cy="149" r="7" fill="#6b4f96"/>
    <circle cx="152" cy="149" r="7" fill="#6b4f96"/>
    <text x="200" y="156" font-family="'SF Mono','Menlo','DejaVu Sans Mono','Consolas',monospace" font-size="20" fill="#6b4f96">debugging the migration</text>

    <text x="104" y="224" font-family="'SF Mono','Menlo','DejaVu Sans Mono','Consolas',monospace" font-size="20" fill="#b794f6"><tspan fill="#d6bcfa">$</tspan> orly sso 9781492029496</text>
    <text x="104" y="258" font-family="'SF Mono','Menlo','DejaVu Sans Mono','Consolas',monospace" font-size="19" fill="#6fd08a">&#10003; Authentication successful</text>
    <text x="104" y="292" font-family="'SF Mono','Menlo','DejaVu Sans Mono','Consolas',monospace" font-size="19" fill="#e06a7a">&#10007; JSONDecodeError: char 0</text>
    <text x="104" y="326" font-family="'SF Mono','Menlo','DejaVu Sans Mono','Consolas',monospace" font-size="17" fill="#6b4f96">  v1 /book/{id}/ returned non-JSON</text>

    <text x="104" y="388" font-family="'SF Mono','Menlo','DejaVu Sans Mono','Consolas',monospace" font-size="19" fill="#b794f6"><tspan fill="#d6bcfa">&#8594;</tspan> switch to v2 manifest</text>
    <text x="104" y="422" font-family="'SF Mono','Menlo','DejaVu Sans Mono','Consolas',monospace" font-size="17" fill="#6b4f96">  /api/v2/epubs/.../files/</text>
    <text x="104" y="456" font-family="'SF Mono','Menlo','DejaVu Sans Mono','Consolas',monospace" font-size="19" fill="#6fd08a">&#10003; created 9781492029496.epub  <tspan fill="#6b4f96">117 files</tspan></text>

    <text x="104" y="522" font-family="'SF Mono','Menlo','DejaVu Sans Mono','Consolas',monospace" font-size="19" fill="#6b4f96">read the code &#183; migrate &#183; delete 80%</text>
  </g>

  <!-- right column -->
  <g font-family="'SF Mono','Menlo','DejaVu Sans Mono','Consolas',monospace">
    <text x="852" y="200" font-size="20" letter-spacing="2" fill="#6b4f96">THE MIGRATION</text>

    <!-- v1 box -->
    <rect x="852" y="220" width="210" height="86" rx="8" fill="none" stroke="#e06a7a" stroke-width="2"/>
    <text x="876" y="256" font-size="24" fill="#e06a7a">v1 book API</text>
    <text x="876" y="288" font-size="16" fill="#6b4f96">crawl + scrape, dead</text>

    <text x="1086" y="270" font-size="30" fill="#b794f6">&#8594;</text>

    <!-- v2 box -->
    <rect x="1126" y="220" width="182" height="86" rx="8" fill="none" stroke="#6fd08a" stroke-width="2"/>
    <text x="1150" y="256" font-size="24" fill="#6fd08a">v2 manifest</text>
    <text x="1150" y="288" font-size="16" fill="#6b4f96">files, JSON</text>

    <!-- guard box -->
    <rect x="852" y="338" width="456" height="68" rx="8" fill="none" stroke="#b794f6" stroke-width="2"/>
    <text x="876" y="368" font-size="18" fill="#d6bcfa">guard .json(): status &#8594; content-type</text>
    <text x="876" y="392" font-size="16" fill="#6b4f96">no more 200-with-a-bot-challenge crashes</text>

    <!-- paywall held bar -->
    <rect x="852" y="468" width="456" height="64" rx="8" fill="none" stroke="#2c2142" stroke-width="2" stroke-dasharray="7 5"/>
    <text x="876" y="507" font-size="19" fill="#b794f6"><tspan fill="#6fd08a">&#9635;</tspan> invalid token = truncated preview</text>

    <text x="852" y="566" font-size="19" fill="#6b4f96">&#8594; the paywall held. learning only.</text>
  </g>
</svg>