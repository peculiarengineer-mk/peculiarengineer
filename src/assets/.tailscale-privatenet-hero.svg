<svg xmlns="http://www.w3.org/2000/svg" width="1360" height="680" viewBox="0 0 1360 680">
  <defs>
    <radialGradient id="glow" cx="30%" cy="35%" r="80%">
      <stop offset="0%" stop-color="#11151d"/>
      <stop offset="100%" stop-color="#0b0d12"/>
    </radialGradient>
    <pattern id="grid" width="34" height="34" patternUnits="userSpaceOnUse">
      <path d="M34 0H0V34" fill="none" stroke="#12161f" stroke-width="1"/>
    </pattern>
  </defs>

  <rect width="1360" height="680" fill="url(#glow)"/>
  <rect width="1360" height="680" fill="url(#grid)" opacity="0.5"/>

  <!-- ghost padlock bottom-right -->
  <g opacity="0.5" stroke="#182236" stroke-width="8" fill="none">
    <rect x="1190" y="512" width="100" height="84" rx="10"/>
    <path d="M1206 512 v-22 a34 34 0 0 1 68 0 v22"/>
  </g>

  <!-- badge -->
  <g>
    <rect x="1076" y="48" width="236" height="46" rx="8" fill="none" stroke="#3d5273" stroke-width="1.5"/>
    <text x="1102" y="77" font-family="'SF Mono','Menlo','DejaVu Sans Mono','Consolas',monospace" font-size="20" letter-spacing="2" fill="#f0883e">&#9670; PRIVATE NET</text>
  </g>

  <!-- terminal -->
  <g>
    <rect x="72" y="120" width="672" height="462" rx="11" fill="#0e121a" stroke="#3d5273" stroke-width="1.5"/>
    <line x1="72" y1="178" x2="744" y2="178" stroke="#12161f" stroke-width="1.5"/>
    <circle cx="104" cy="149" r="7" fill="#3d5273"/>
    <circle cx="128" cy="149" r="7" fill="#3d5273"/>
    <circle cx="152" cy="149" r="7" fill="#3d5273"/>
    <text x="200" y="156" font-family="'SF Mono','Menlo','DejaVu Sans Mono','Consolas',monospace" font-size="20" fill="#3d5273">prod &#183; bind to the tailnet, never public</text>

    <text x="104" y="220" font-family="'SF Mono','Menlo','DejaVu Sans Mono','Consolas',monospace" font-size="16" fill="#3d5273"># redis.conf</text>
    <text x="104" y="248" font-family="'SF Mono','Menlo','DejaVu Sans Mono','Consolas',monospace" font-size="17" fill="#ffb37a">bind <tspan fill="#5a7bf0">100.72.10.4</tspan> 127.0.0.1</text>
    <text x="104" y="288" font-family="'SF Mono','Menlo','DejaVu Sans Mono','Consolas',monospace" font-size="16" fill="#3d5273"># mongod.conf</text>
    <text x="104" y="316" font-family="'SF Mono','Menlo','DejaVu Sans Mono','Consolas',monospace" font-size="17" fill="#ffb37a">bindIp: <tspan fill="#5a7bf0">100.72.10.4</tspan>, 127.0.0.1</text>

    <text x="104" y="378" font-family="'SF Mono','Menlo','DejaVu Sans Mono','Consolas',monospace" font-size="17" fill="#f0883e"><tspan fill="#ffb37a">$</tspan> sudo tailscale up --ssh</text>
    <text x="104" y="406" font-family="'SF Mono','Menlo','DejaVu Sans Mono','Consolas',monospace" font-size="17" fill="#6fd08a"><tspan fill="#6fd08a">&#10003;</tspan> SSH over the tailnet, port 22 stays shut</text>

    <text x="104" y="466" font-family="'SF Mono','Menlo','DejaVu Sans Mono','Consolas',monospace" font-size="17" fill="#e5534b"><tspan fill="#e5534b">&#10007;</tspan> key expired &#8594; the tunnel silently drops</text>
    <text x="104" y="494" font-family="'SF Mono','Menlo','DejaVu Sans Mono','Consolas',monospace" font-size="17" fill="#ffb37a">  disable key expiry on servers you trust</text>

    <text x="104" y="554" font-family="'SF Mono','Menlo','DejaVu Sans Mono','Consolas',monospace" font-size="18" fill="#3d5273">datastores hear only the tailnet interface</text>
  </g>

  <!-- right: the topology -->
  <g font-family="'SF Mono','Menlo','DejaVu Sans Mono','Consolas',monospace">
    <text x="852" y="196" font-size="20" letter-spacing="2" fill="#3d5273">THE PRIVATE PATH</text>

    <rect x="852" y="216" width="200" height="72" rx="10" fill="none" stroke="#f0883e" stroke-width="2"/>
    <text x="952" y="250" font-size="19" fill="#ffb37a" text-anchor="middle">worker VPS</text>
    <text x="952" y="274" font-size="15" fill="#3d5273" text-anchor="middle">regional</text>

    <rect x="1108" y="216" width="200" height="72" rx="10" fill="none" stroke="#f0883e" stroke-width="2"/>
    <text x="1208" y="250" font-size="19" fill="#ffb37a" text-anchor="middle">prod server</text>
    <text x="1208" y="274" font-size="15" fill="#3d5273" text-anchor="middle">Redis &#183; Mongo</text>

    <!-- encrypted link -->
    <path d="M1052 252 H1108" stroke="#5a7bf0" stroke-width="2.5"/>
    <text x="1080" y="238" font-size="14" fill="#5a7bf0" text-anchor="middle">WireGuard</text>

    <rect x="852" y="330" width="456" height="60" rx="8" fill="none" stroke="#6fd08a" stroke-width="2"/>
    <text x="876" y="367" font-size="18" fill="#6fd08a"><tspan fill="#6fd08a">&#10003;</tspan> listens only on the tailnet IP</text>

    <rect x="852" y="404" width="456" height="60" rx="8" fill="none" stroke="#e5534b" stroke-width="2"/>
    <text x="876" y="441" font-size="18" fill="#e5534b"><tspan fill="#e5534b">&#10007;</tspan> the public internet can't reach it</text>

    <text x="852" y="516" font-size="18" fill="#3d5273">auth keys &#183; ACLs &#183; and the expiry gotcha</text>
    <text x="852" y="544" font-size="18" fill="#3d5273">that silently breaks you months later.</text>
  </g>
</svg>