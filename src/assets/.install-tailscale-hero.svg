<svg xmlns="http://www.w3.org/2000/svg" width="1360" height="680" viewBox="0 0 1360 680">
  <defs>
    <radialGradient id="glow" cx="30%" cy="35%" r="80%">
      <stop offset="0%" stop-color="#11151d"/>
      <stop offset="100%" stop-color="#0b0d12"/>
    </radialGradient>
    <pattern id="grid" width="34" height="34" patternUnits="userSpaceOnUse">
      <path d="M34 0H0V34" fill="none" stroke="#12161f" stroke-width="1"/>
    </pattern>
  </defs>

  <rect width="1360" height="680" fill="url(#glow)"/>
  <rect width="1360" height="680" fill="url(#grid)" opacity="0.5"/>

  <!-- ghost mesh bottom-right -->
  <g opacity="0.5">
    <path d="M1170 470 L1300 470 M1170 470 L1235 600 M1300 470 L1235 600 M1170 470 L1235 540 M1300 470 L1235 540" stroke="#182236" stroke-width="4" fill="none"/>
    <circle cx="1170" cy="470" r="20" fill="none" stroke="#182236" stroke-width="2"/><circle cx="1300" cy="470" r="20" fill="none" stroke="#182236" stroke-width="2"/><circle cx="1235" cy="600" r="20" fill="none" stroke="#182236" stroke-width="2"/><circle cx="1235" cy="540" r="14" fill="none" stroke="#182236" stroke-width="2"/>
  </g>

  <!-- badge -->
  <g>
    <rect x="1104" y="48" width="208" height="46" rx="8" fill="none" stroke="#3d5273" stroke-width="1.5"/>
    <text x="1130" y="77" font-family="'SF Mono','Menlo','DejaVu Sans Mono','Consolas',monospace" font-size="20" letter-spacing="2" fill="#f0883e">&#9670; TAILSCALE</text>
  </g>

  <!-- terminal -->
  <g>
    <rect x="72" y="120" width="672" height="462" rx="11" fill="#0e121a" stroke="#3d5273" stroke-width="1.5"/>
    <line x1="72" y1="178" x2="744" y2="178" stroke="#12161f" stroke-width="1.5"/>
    <circle cx="104" cy="149" r="7" fill="#3d5273"/>
    <circle cx="128" cy="149" r="7" fill="#3d5273"/>
    <circle cx="152" cy="149" r="7" fill="#3d5273"/>
    <text x="200" y="156" font-family="'SF Mono','Menlo','DejaVu Sans Mono','Consolas',monospace" font-size="20" fill="#3d5273">ubuntu 24.04 &#183; joining the tailnet</text>

    <text x="104" y="222" font-family="'SF Mono','Menlo','DejaVu Sans Mono','Consolas',monospace" font-size="16" fill="#f0883e"><tspan fill="#ffb37a">$</tspan> curl -fsSL https://tailscale.com/install.sh | sh</text>
    <text x="104" y="264" font-family="'SF Mono','Menlo','DejaVu Sans Mono','Consolas',monospace" font-size="17" fill="#f0883e"><tspan fill="#ffb37a">$</tspan> sudo tailscale up</text>
    <text x="104" y="292" font-family="'SF Mono','Menlo','DejaVu Sans Mono','Consolas',monospace" font-size="16" fill="#3d5273">  # headless? use an auth key instead:</text>
    <text x="104" y="320" font-family="'SF Mono','Menlo','DejaVu Sans Mono','Consolas',monospace" font-size="16" fill="#f0883e"><tspan fill="#ffb37a">$</tspan> sudo tailscale up --authkey tskey-auth-...</text>

    <text x="104" y="382" font-family="'SF Mono','Menlo','DejaVu Sans Mono','Consolas',monospace" font-size="17" fill="#f0883e"><tspan fill="#ffb37a">$</tspan> tailscale ip -4</text>
    <text x="104" y="410" font-family="'SF Mono','Menlo','DejaVu Sans Mono','Consolas',monospace" font-size="17" fill="#5a7bf0">100.86.42.7</text>

    <text x="104" y="466" font-family="'SF Mono','Menlo','DejaVu Sans Mono','Consolas',monospace" font-size="17" fill="#f0883e"><tspan fill="#ffb37a">$</tspan> sudo systemctl enable --now tailscaled</text>
    <text x="104" y="494" font-family="'SF Mono','Menlo','DejaVu Sans Mono','Consolas',monospace" font-size="17" fill="#6fd08a"><tspan fill="#6fd08a">&#10003;</tspan> survives a reboot</text>

    <text x="104" y="554" font-family="'SF Mono','Menlo','DejaVu Sans Mono','Consolas',monospace" font-size="18" fill="#3d5273">interactive login, or an auth key on a headless box</text>
  </g>

  <!-- right: what you get -->
  <g font-family="'SF Mono','Menlo','DejaVu Sans Mono','Consolas',monospace">
    <text x="852" y="200" font-size="20" letter-spacing="2" fill="#3d5273">WHAT YOU GET</text>

    <rect x="852" y="220" width="456" height="64" rx="8" fill="none" stroke="#5a7bf0" stroke-width="2"/>
    <text x="876" y="259" font-size="19" fill="#ffb37a">a <tspan fill="#5a7bf0">100.x</tspan> address on your tailnet</text>

    <text x="1080" y="312" font-size="22" fill="#3d5273" text-anchor="middle">&#8595;</text>

    <rect x="852" y="328" width="456" height="64" rx="8" fill="none" stroke="#3d5273" stroke-width="2"/>
    <text x="876" y="367" font-size="19" fill="#ffb37a">WireGuard tunnels, no ports opened</text>

    <text x="1080" y="420" font-size="22" fill="#3d5273" text-anchor="middle">&#8595;</text>

    <rect x="852" y="436" width="456" height="64" rx="8" fill="none" stroke="#6fd08a" stroke-width="2"/>
    <text x="876" y="475" font-size="19" fill="#6fd08a"><tspan fill="#6fd08a">&#10003;</tspan> reachable from every other node</text>

    <text x="852" y="546" font-size="18" fill="#3d5273">install &#183; join &#183; verify &#183; make it stick</text>
  </g>
</svg>