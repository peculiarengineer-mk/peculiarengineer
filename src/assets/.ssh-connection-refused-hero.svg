<svg xmlns="http://www.w3.org/2000/svg" width="1360" height="680" viewBox="0 0 1360 680">
  <defs>
    <radialGradient id="glow" cx="30%" cy="35%" r="80%">
      <stop offset="0%" stop-color="#0a1320"/>
      <stop offset="100%" stop-color="#06080d"/>
    </radialGradient>
    <pattern id="grid" width="34" height="34" patternUnits="userSpaceOnUse">
      <path d="M34 0H0V34" fill="none" stroke="#0d1626" stroke-width="1"/>
    </pattern>
  </defs>

  <rect width="1360" height="680" fill="url(#glow)"/>
  <rect width="1360" height="680" fill="url(#grid)" opacity="0.5"/>

  <!-- badge top-right -->
  <g>
    <rect x="976" y="48" width="336" height="46" rx="8" fill="none" stroke="#3a5a8a" stroke-width="1.5"/>
    <text x="1002" y="77" font-family="'SF Mono','Menlo','DejaVu Sans Mono','Consolas',monospace" font-size="18" letter-spacing="1.5" fill="#5b8dd6">&#9670; IS ANYTHING ON :22?</text>
  </g>

  <!-- terminal window -->
  <g>
    <rect x="72" y="120" width="672" height="462" rx="11" fill="#080d16" stroke="#3a5a8a" stroke-width="1.5"/>
    <line x1="72" y1="178" x2="744" y2="178" stroke="#101a2c" stroke-width="1.5"/>
    <circle cx="104" cy="149" r="7" fill="#3a5a8a"/>
    <circle cx="128" cy="149" r="7" fill="#3a5a8a"/>
    <circle cx="152" cy="149" r="7" fill="#3a5a8a"/>
    <text x="200" y="156" font-family="'SF Mono','Menlo','DejaVu Sans Mono','Consolas',monospace" font-size="20" fill="#3a5a8a">server console &#183; :22</text>

    <text x="104" y="222" font-family="'SF Mono','Menlo','DejaVu Sans Mono','Consolas',monospace" font-size="17" fill="#e0564a"><tspan fill="#e0564a">&#10007;</tspan> connect to host port 22: refused</text>

    <text x="104" y="284" font-family="'SF Mono','Menlo','DejaVu Sans Mono','Consolas',monospace" font-size="17" fill="#5b8dd6"><tspan fill="#9cc2f2">$</tspan> sudo ss -tlnp | grep :22</text>
    <text x="104" y="312" font-family="'SF Mono','Menlo','DejaVu Sans Mono','Consolas',monospace" font-size="16" fill="#3a5a8a">(nothing listening)</text>

    <text x="104" y="374" font-family="'SF Mono','Menlo','DejaVu Sans Mono','Consolas',monospace" font-size="17" fill="#5b8dd6"><tspan fill="#9cc2f2">$</tspan> sudo apt install openssh-server</text>
    <text x="104" y="402" font-family="'SF Mono','Menlo','DejaVu Sans Mono','Consolas',monospace" font-size="17" fill="#5b8dd6"><tspan fill="#9cc2f2">$</tspan> sudo systemctl enable --now ssh</text>

    <text x="104" y="464" font-family="'SF Mono','Menlo','DejaVu Sans Mono','Consolas',monospace" font-size="17" fill="#6fd08a"><tspan fill="#6fd08a">&#10003;</tspan> LISTEN 0 128 0.0.0.0:22 sshd</text>

    <text x="104" y="544" font-family="'SF Mono','Menlo','DejaVu Sans Mono','Consolas',monospace" font-size="18" fill="#3a5a8a">refused means reachable, just no listener</text>
  </g>

  <!-- right column: refused vs timed out -->
  <g font-family="'SF Mono','Menlo','DejaVu Sans Mono','Consolas',monospace">
    <text x="852" y="200" font-size="20" letter-spacing="2" fill="#3a5a8a">READ THE ERROR</text>

    <rect x="852" y="222" width="456" height="118" rx="8" fill="none" stroke="#5b8dd6" stroke-width="2"/>
    <text x="880" y="262" font-size="19" fill="#9cc2f2">Connection refused</text>
    <text x="880" y="292" font-size="16" fill="#3a5a8a">reachable &#183; nothing on the port</text>
    <text x="880" y="320" font-size="16" fill="#6fd08a">fix on the box: start sshd</text>

    <rect x="852" y="356" width="456" height="118" rx="8" fill="none" stroke="#3a5a8a" stroke-width="1.5"/>
    <text x="880" y="396" font-size="19" fill="#9cc2f2">Connection timed out</text>
    <text x="880" y="426" font-size="16" fill="#3a5a8a">not reachable at all</text>
    <text x="880" y="454" font-size="16" fill="#e0564a">wrong address or firewall drop</text>

    <text x="852" y="522" font-size="17" fill="#9cc2f2">nc -vz host 22</text>
    <text x="852" y="550" font-size="17" fill="#9cc2f2">systemctl status ssh.socket</text>
  </g>
</svg>