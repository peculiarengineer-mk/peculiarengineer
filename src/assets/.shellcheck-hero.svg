<svg xmlns="http://www.w3.org/2000/svg" width="1360" height="680" viewBox="0 0 1360 680">
  <defs>
    <radialGradient id="glow" cx="30%" cy="35%" r="80%">
      <stop offset="0%" stop-color="#14100a"/>
      <stop offset="100%" stop-color="#0c0a06"/>
    </radialGradient>
    <pattern id="grid" width="34" height="34" patternUnits="userSpaceOnUse">
      <path d="M34 0H0V34" fill="none" stroke="#1d1709" stroke-width="1"/>
    </pattern>
  </defs>

  <rect width="1360" height="680" fill="url(#glow)"/>
  <rect width="1360" height="680" fill="url(#grid)" opacity="0.5"/>

  <!-- big ghost warning triangle, bottom-right -->
  <path d="M1230 430 L1330 620 L1130 620 Z" fill="none" stroke="#3a2e14" stroke-width="10" opacity="0.6"/>
  <text x="1218" y="600" font-family="'SF Mono','Menlo','DejaVu Sans Mono','Consolas',monospace" font-size="120" fill="#3a2e14" opacity="0.6">!</text>

  <!-- badge top-right -->
  <g>
    <rect x="1096" y="48" width="216" height="46" rx="8" fill="none" stroke="#8a6d2f" stroke-width="1.5"/>
    <text x="1124" y="77" font-family="'SF Mono','Menlo','DejaVu Sans Mono','Consolas',monospace" font-size="22" letter-spacing="3" fill="#f2c14e">&#9888; SHELLCHECK</text>
  </g>

  <!-- terminal window -->
  <g>
    <rect x="72" y="120" width="672" height="462" rx="11" fill="#100c06" stroke="#8a6d2f" stroke-width="1.5"/>
    <line x1="72" y1="178" x2="744" y2="178" stroke="#3a2e14" stroke-width="1.5"/>
    <circle cx="104" cy="149" r="7" fill="#8a6d2f"/>
    <circle cx="128" cy="149" r="7" fill="#8a6d2f"/>
    <circle cx="152" cy="149" r="7" fill="#8a6d2f"/>
    <text x="200" y="156" font-family="'SF Mono','Menlo','DejaVu Sans Mono','Consolas',monospace" font-size="20" fill="#8a6d2f">shellcheck deploy.sh</text>

    <text x="104" y="228" font-family="'SF Mono','Menlo','DejaVu Sans Mono','Consolas',monospace" font-size="21" fill="#f2c14e"><tspan fill="#ffd97a">$</tspan> shellcheck deploy.sh</text>

    <text x="104" y="288" font-family="'SF Mono','Menlo','DejaVu Sans Mono','Consolas',monospace" font-size="20" fill="#e06a5a">&#9888; SC2045 <tspan fill="#8a6d2f">iterating over ls output</tspan></text>
    <text x="104" y="324" font-family="'SF Mono','Menlo','DejaVu Sans Mono','Consolas',monospace" font-size="20" fill="#e06a5a">&#9888; SC2086 <tspan fill="#8a6d2f">rm $f is unquoted</tspan></text>
    <text x="104" y="360" font-family="'SF Mono','Menlo','DejaVu Sans Mono','Consolas',monospace" font-size="20" fill="#e06a5a">&#9888; SC2086 <tspan fill="#8a6d2f">[ $1 == ... ] unquoted</tspan></text>

    <text x="104" y="424" font-family="'SF Mono','Menlo','DejaVu Sans Mono','Consolas',monospace" font-size="20" fill="#6fd08a"><tspan fill="#6fd08a">&#10003;</tspan> rm "$f"   <tspan fill="#8a6d2f">for f in *.log</tspan></text>
    <text x="104" y="460" font-family="'SF Mono','Menlo','DejaVu Sans Mono','Consolas',monospace" font-size="20" fill="#6fd08a"><tspan fill="#6fd08a">&#10003;</tspan> [ "$1" = "prod" ]</text>

    <text x="104" y="522" font-family="'SF Mono','Menlo','DejaVu Sans Mono','Consolas',monospace" font-size="19" fill="#8a6d2f">lint &#183; look up the code &#183; quote it</text>
  </g>

  <!-- right column -->
  <g font-family="'SF Mono','Menlo','DejaVu Sans Mono','Consolas',monospace">
    <text x="852" y="200" font-size="20" letter-spacing="2" fill="#8a6d2f">SILENT SHELL FOOTGUNS</text>

    <rect x="852" y="220" width="456" height="86" rx="8" fill="none" stroke="#f2c14e" stroke-width="2"/>
    <text x="876" y="256" font-size="22" fill="#ffd97a">empty var, no error</text>
    <text x="876" y="288" font-size="17" fill="#8a6d2f">rm -rf "$DIR"/  &#8594;  rm -rf /</text>

    <rect x="852" y="320" width="456" height="86" rx="8" fill="none" stroke="#8a6d2f" stroke-width="2"/>
    <text x="876" y="356" font-size="22" fill="#f2c14e">passes the test, then bites</text>
    <text x="876" y="388" font-size="17" fill="#8a6d2f">odd filename &#183; empty arg &#183; exits 0</text>

    <rect x="852" y="468" width="456" height="64" rx="8" fill="none" stroke="#3a2e14" stroke-width="2" stroke-dasharray="7 5"/>
    <text x="876" y="507" font-size="19" fill="#f2c14e"><tspan fill="#ffd97a">&#9635;</tspan> editor + CI  <tspan fill="#8a6d2f">so it never skips</tspan></text>

    <text x="852" y="566" font-size="19" fill="#8a6d2f">&#8594; cheap insurance on scripts that touch prod.</text>
  </g>
</svg>